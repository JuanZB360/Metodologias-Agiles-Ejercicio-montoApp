<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestorVentas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-xl font-bold">Ventas & Cartera</h1>
        <button id="logout-btn" class="hidden text-sm bg-indigo-700 px-3 py-1 rounded">Salir</button>
    </header>

    <main id="app" class="p-4 max-w-2xl mx-auto">
        </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 shadow-2xl z-50">
        <button onclick="Router.go('inventory')" class="flex flex-col items-center text-gray-600 hover:text-indigo-600">
            <i class="fas fa-boxes text-xl"></i><span class="text-xs">Stock</span>
        </button>
        <button onclick="Router.go('new-sale')" class="flex flex-col items-center text-gray-600 hover:text-indigo-600">
            <i class="fas fa-plus-circle text-xl"></i><span class="text-xs">Vender</span>
        </button>
        <button onclick="Router.go('wallet')" class="flex flex-col items-center text-gray-600 hover:text-indigo-600">
            <i class="fas fa-hand-holding-usd text-xl"></i><span class="text-xs">Cartera</span>
        </button>
    </nav>

    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
